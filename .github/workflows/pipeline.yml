name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Filtrer les fichiers modifiés
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'backend/requirements.txt'


  secret-scan:
    name: Scan Secrets (Gitleaks)
    runs-on: ubuntu-latest
    # Pas de dépendance → tourne toujours en parallèle avec detect-changes
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    name: Lint Python (Flake8)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    # Lab 5 — Ne tourne QUE si des fichiers Python ont changé
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Flake8
        run: pip install flake8

      - name: Lancer Flake8
        run: flake8 backend/ --max-line-length=120 --exclude=__pycache__,.env,migrations --ignore=W292,W293,W504 --statistics --count

  bandit:
    name: Sécurité Code (Bandit)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    # Lab 5 — Ne tourne QUE si des fichiers Python ont changé
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Bandit
        run: pip install bandit

      - name: Lancer Bandit
        run: bandit -r backend/ -ll -x backend/__pycache__ -s B104 #ignore l'erreur du 0.0.0.0

  pip-audit:
    name: Sécurité Dépendances (pip-audit)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    # Lab 5 — Ne tourne QUE si des fichiers Python ont changé
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pip-audit
        run: pip install pip-audit

      - name: Lancer pip-audit
        run: pip-audit -r backend/requirements.txt


  build:
    name: Build (python)
    runs-on: ubuntu-latest
    #  Lab 5 — Attend tous les jobs de test (needs)
    needs: [secret-scan, lint, bandit, pip-audit]
    # always() + !failure() : continue si certains jobs ont été skippés (pas de .py modifié)
    # mais bloque si l'un d'eux a réellement échoué
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Vérifier que l'app démarre
        run: |
          cd backend
          python -c "import app; print('App importée avec succès')"


  docker:
    name: Docker — Build & Scan (Trivy)
    runs-on: ubuntu-latest
    # Lab 5 — Ne builder l'image Docker QUE si les tests sont OK
    needs: [build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-app:${{ github.sha }} .

      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mon-app:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore

      - name: Scanner le repo avec Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore

  dast:
    name: DAST — Scan Runtime (Nikto)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-app:${{ github.sha }} -f backend/Dockerfile .

      - name: Démarrer l'application
        run: |
          docker run -d \
            --name mon-app-dast \
            -p 8000:8000 \
            mon-app:${{ github.sha }}
          echo "Attente du démarrage de l'application..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Application prête"
              break
            fi
            echo "Tentative $i/15..."
            sleep 2
          done

      - name: Installer Nikto
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nikto

      - name: Lancer Nikto (DAST)
        run: |
          nikto -h http://localhost:8000 \
            -output nikto-report.txt \
            -Format txt \
            -Tuning 1234567890ab \
            -nointeractive || true

      - name: Afficher le rapport Nikto
        if: always()
        run: cat nikto-report.txt

      - name: Upload rapport Nikto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nikto-report
          path: nikto-report.txt
          retention-days: 30

      - name: Arrêter le conteneur
        if: always()
        run: docker stop mon-app-dast && docker rm mon-app-dast


  push-dockerhub:
    name: Push DockerHub
    runs-on: ubuntu-latest
    needs: [dast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mon-app
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build et Push vers DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}