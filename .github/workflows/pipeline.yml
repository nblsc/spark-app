name: "Lab1 · Qualité & Secrets"

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
# ─────────────────────────────────────────────────────────────
# OBLIGATOIRE 1/2 — Ruff
# ─────────────────────────────────────────────────────────────
  lint:
    name: "Linter — Ruff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Installation et Run Ruff
        run: |
          pip install ruff
          ruff check src/
          ruff format --check src/

      - name: Aide si échec
        if: failure()
        run: echo "::error::Échec du Linting. Lancez 'ruff check --fix' localement."

# ─────────────────────────────────────────────────────────────
# OBLIGATOIRE 2/2 — Scan Secrets (Gitleaks)
# ─────────────────────────────────────────────────────────────
  gitleaks:
    name: "Sécurité — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important : scanne tout l'historique

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # BONUS : Utilisation de la règle custom via le fichier config
          GITLEAKS_CONFIG: .gitleaks.toml 

# ─────────────────────────────────────────────────────────────
# BONUS — Alternative à Gitleaks (detect-secrets)
# ─────────────────────────────────────────────────────────────
  detect-secrets:
    name: "Bonus — detect-secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & Scan
        run: |
          pip install detect-secrets
          detect-secrets scan src/ > .secrets.baseline
          # Le script échoue si un secret est trouvé (via le baseline)
          if grep -q "results" .secrets.baseline; then exit 1; fi