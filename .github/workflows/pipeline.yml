name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:


  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Filtrer les fichiers modifiés
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'backend/requirements.txt'


  secret-scan:
    name: Scan Secrets (Gitleaks + règle custom)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan avec Gitleaks (config custom)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  secret-scan-trufflehog:
    name: Scan Secrets (TruffleHog — alternative)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan avec TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  lint:
    name: Lint Python (Flake8)
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Flake8
        run: pip install flake8

      - name: Lancer Flake8
        run: flake8 backend/ --max-line-length=120 --exclude=__pycache__,.env,migrations --ignore=W292,W293,W504,E303 --statistics --count

  bandit:
    name: Sécurité Code (Bandit)
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Bandit
        run: pip install bandit

      - name: Lancer Bandit
        run: bandit -r backend/ -ll -x backend/__pycache__ -s B104

  semgrep:
    name: Sécurité Code (Semgrep)
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Semgrep
        run: pip install semgrep

      - name: Lancer Semgrep
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/flask \
            --config=p/owasp-top-ten \
            backend/ \
            --json > semgrep-report.json || true

      - name: Afficher le résumé Semgrep
        if: always()
        run: |
          semgrep scan \
            --config=p/python \
            --config=p/flask \
            --config=p/owasp-top-ten \
            backend/ || true

      - name: Upload rapport Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  pip-audit:
    name: Sécurité Dépendances (pip-audit)
    runs-on: ubuntu-24.04
    needs: [detect-changes]
    if: needs.detect-changes.outputs.python == 'true'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pip-audit
        run: pip install pip-audit

      - name: Lancer pip-audit
        run: pip-audit -r backend/requirements.txt


  build:
    name: Build (Python)
    runs-on: ubuntu-24.04
    needs: [secret-scan, secret-scan-trufflehog, lint, bandit, semgrep, pip-audit]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Vérifier que l'app démarre
        run: |
          cd backend
          python -c "import app; print('App importée avec succès')"


  trivy-pre-build:
    name: Scan Pré-Build (Trivy FS + Config)
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan filesystem — code source & dépendances
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore
          skip-files: "fake_secret_demo.py"

      - name: Scan config — Dockerfile (mauvaises pratiques IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM
          skip-files: "fake_secret_demo.py"


  docker:
    name: Docker — Build Multi-Stage Distroless & Scan Post-Build (Trivy)
    runs-on: ubuntu-24.04
    needs: [trivy-pre-build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Build le stage intermédiaire uniquement (vérifie que les deps s'installent)
      - name: Build stage builder (intermédiaire)
        run: docker build --target builder -t mon-app-builder:${{ github.sha }} .

      # Build l'image finale multi-stage → stage Distroless
      - name: Build image finale (Distroless)
        run: docker build -t mon-app:${{ github.sha }} .

      # Bonus — Scan POST-BUILD : scanne l'image Distroless finale produite
      - name: Scan post-build de l'image Distroless (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mon-app:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore


  dast:
    name: DAST — Scan Runtime (Nikto)
    runs-on: ubuntu-24.04
    needs: [docker]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-app:${{ github.sha }} .

      - name: Démarrer l'application
        run: |
          docker run -d \
            --name mon-app-dast \
            -p 8000:8000 \
            mon-app:${{ github.sha }}
          echo "Attente du démarrage de l'application..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Application prête"
              break
            fi
            echo "Tentative $i/15..."
            sleep 2
          done

      - name: Installer Nikto
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nikto

      - name: Lancer Nikto (DAST)
        run: |
          nikto -h http://localhost:8000 \
            -output nikto-report.txt \
            -Format txt \
            -Tuning 1234567890ab \
            -nointeractive || true

      - name: Afficher le rapport Nikto
        if: always()
        run: cat nikto-report.txt

      - name: Upload rapport Nikto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nikto-report
          path: nikto-report.txt
          retention-days: 30

      - name: Arrêter le conteneur
        if: always()
        run: docker stop mon-app-dast && docker rm mon-app-dast


  push-deploy:
    name: Push GHCR & Deploy Render
    runs-on: ubuntu-24.04
    needs: [dast]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'pull_request')
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=dev
            type=sha,prefix=sha-

      - name: Build et Push vers GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}