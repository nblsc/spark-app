name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  secret-scan:
    name: Scan Secrets (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}


  lint:
    name: Lint Python (Flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Flake8
        run: pip install flake8

      - name: Lancer Flake8
        run: flake8 backend/ --max-line-length=120 --exclude=__pycache__,.env,migrations --ignore=W292,W293 --statistics --count


  bandit:
    name: Sécurité Code (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Bandit
        run: pip install bandit

      - name: Lancer Bandit
        run: bandit -r backend/ -ll -x backend/__pycache__


  pip-audit:
    name: Sécurité Dépendances (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pip-audit
        run: pip install pip-audit

      - name: Lancer pip-audit
        run: pip-audit -r backend/requirements.txt


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-scan, lint, bandit, pip-audit]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Vérifier que l'app démarre
        run: |
          cd backend
          python -c "import app; print(' App importée avec succès')"


  docker:
    name: Docker — Build & Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-app:${{ github.sha }} .

      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mon-app:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM