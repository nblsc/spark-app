name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  secret-scan:
    name: Scan Secrets (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}


  lint:
    name: Lint Python (Flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Flake8
        run: pip install flake8

      - name: Lancer Flake8
        run: flake8 backend/ --max-line-length=120 --exclude=__pycache__,.env,migrations --ignore=W292,W293 --statistics --count


  bandit:
    name: Sécurité Code (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer Bandit
        run: pip install bandit

      - name: Lancer Bandit
        run: bandit -r backend/ -ll -x backend/__pycache__


  pip-audit:
    name: Sécurité Dépendances (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer pip-audit
        run: pip install pip-audit

      - name: Lancer pip-audit
        run: pip-audit -r backend/requirements.txt


  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-scan, lint, bandit, pip-audit]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Vérifier que l'app démarre
        run: |
          cd backend
          python -c "import app; print('✅ App importée avec succès')"


  docker:
    name: Docker — Build & Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t mon-app:${{ github.sha }} -f backend/Dockerfile .

      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mon-app:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore

      - name: Scanner le repo avec Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          trivyignores: .trivyignore


  dast:
    name: DAST — Scan Runtime (Nikto)
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t app-dating:${{ github.sha }} -f backend/Dockerfile .

      - name: Démarrer l'application
        run: |
          docker run -d --name app-dating-dast -p 8000:8000 app-dating:test
          timeout 30s sh -c 'until curl -s http://localhost:8000/ > /dev/null; do sleep 2; done'

      - name: Scan Nikto
        run: |
          # On utilise l'image officielle Nikto. 
          # On scanne l'IP de l'hôte (172.17.0.1 sous Docker Linux) ou localhost
          docker run --rm sullo/nikto -h http://172.17.0.1:5000 -o report_nikto.html -Format htm
        continue-on-error: true # Nikto renvoie souvent des warnings, on ne veut pas bloquer le push sauf erreur critique

      # 4. Exporter le résultat (Bonus : Artefact)
      - name: Upload Nikto Report
        uses: actions/upload-artifact@v4
        with:
          name: rapport-securite-nikto
          path: report_nikto.html


  push-dockerhub:
    name: Push DockerHub
    runs-on: ubuntu-latest
    needs: [dast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Se connecter à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/app-dating
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build et Push vers DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}    #test