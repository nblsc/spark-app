name: CI
 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
 
jobs:
 
  # ─── Job 1 : Scan des secrets ───────────────────────────────────────────────
  secret-scan:
    name: Scan Secrets (Gitleaks)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nécessaire pour que Gitleaks scanne tout l'historique
 
      - name: Scan avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
 
  # ─── Job 2 : Lint du code Python ────────────────────────────────────────────
  lint:
    name: Lint Python (Flake8)
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Installer Flake8
        run: pip install flake8
 
      - name: Lancer Flake8
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=__pycache__,.env,migrations \
            --statistics \
            --count
 
  # ─── Job 3 : Build (conditionné aux deux jobs précédents) ───────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secret-scan, lint]  # ne tourne que si les 2 jobs passent
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
 
      - name: Vérifier que l'app démarre
        run: |
          cd backend
          python -c "import app; print(' App importée avec succès')"