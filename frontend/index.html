<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">spark</div>
    <div class="notes-badge" id="notesBadge" onclick="toggleNotesPanel()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="count" id="notesLeft">4</span> notes
    </div>
  </header>

  <div class="stack" id="stack"></div>

  <div class="empty-state" id="emptyState">
    <div class="empty-emoji">🌙</div>
    <div class="empty-title">C'est tout pour aujourd'hui</div>
    <div class="empty-sub">Reviens demain pour de nouveaux profils</div>
  </div>

  <div class="actions" id="actions">
    <button class="action-btn btn-nope" onclick="swipeCard('left')" title="Passer">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="action-btn btn-note" onclick="openNoteModal()" title="Envoyer une note" id="noteBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffd166" stroke-width="2.5" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button class="action-btn btn-like" onclick="swipeCard('right')" title="Liker">
      <svg viewBox="0 0 24 24" fill="white" stroke="none">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalName">Envoyer une note à</div>
      <div class="modal-sub" id="notesRemaining">Il te reste <strong>4</strong> notes aujourd'hui</div>
      <textarea class="note-textarea" id="noteText" placeholder="Dis quelque chose d'authentique..." maxlength="200"></textarea>
      <div class="char-count"><span id="charCount">0</span>/200</div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn btn-send" id="sendBtn" onclick="sendNote()">Envoyer avec le like ❤️</button>
      </div>
    </div>
  </div>

  <div class="notes-panel" id="notesPanel">
    <div class="panel-header">
      <div class="panel-title">Notes envoyées</div>
      <div class="panel-close" onclick="toggleNotesPanel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
    </div>
    <div id="notesList"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
