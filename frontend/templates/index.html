<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-logo">spark</div>
    <div class="auth-tagline">Rencontres authentiques</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Connexion</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Créer un compte</button>
    </div>
    <div class="auth-form" id="loginForm">
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="loginEmail" placeholder="toi@email.com" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <div class="auth-error" id="loginError"></div>
      <button class="btn-auth" onclick="doLogin()">Se connecter</button>
    </div>
    <div class="auth-form hidden" id="registerForm">
      <div class="field">
        <label>Prénom</label>
        <input type="text" id="regName" placeholder="Ton prénom" maxlength="30" />
      </div>
      <div class="field">
        <label>Âge</label>
        <input type="number" id="regAge" placeholder="25" min="18" max="99" />
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="regDesc" placeholder="Parle-nous de toi en quelques mots..." maxlength="150"></textarea>
      </div>
      <div class="field">
        <label>Centres d'intérêt <span class="muted">(séparés par des virgules)</span></label>
        <input type="text" id="regTags" placeholder="Musique, Voyage, Tech" />
      </div>
      <div class="field">
        <label>Adresse e-mail</label>
        <input type="email" id="regEmail" placeholder="toi@email.com" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="regPassword" placeholder="••••••••" minlength="6" />
      </div>
      <div class="auth-error" id="registerError"></div>
      <button class="btn-auth" onclick="doRegister()">Créer mon profil ✦</button>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen" class="hidden">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-btn" onclick="showSwipeScreen()" title="Découvrir" id="navSwipeBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <div class="nav-logo">spark</div>
      <div class="nav-actions">
        <div class="nav-btn" onclick="toggleMatchesPanel()" title="Mes matches" id="navMatchesBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="nav-btn" onclick="toggleProfilePanel()" title="Mon profil" id="navProfileBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div class="nav-btn" onclick="doLogout()" title="Se déconnecter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
      </div>
    </nav>

    <!-- SWIPE SCREEN -->
    <div id="swipeScreen">
      <div class="stack" id="stack"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-emoji">🌙</div>
        <div class="empty-title">C'est tout pour aujourd'hui</div>
        <div class="empty-sub">Reviens demain pour de nouveaux profils</div>
      </div>
      <div class="empty-state" id="noUsersState">
        <div class="empty-emoji">👀</div>
        <div class="empty-title">Aucun profil pour l'instant</div>
        <div class="empty-sub">Invite tes amis à créer un compte !</div>
      </div>
      <div class="actions" id="actions">
        <button class="action-btn btn-nope" onclick="swipeCard('left')" title="Passer">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button class="action-btn btn-note" onclick="openNoteModal()" title="Envoyer une note" id="noteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffd166" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button class="action-btn btn-like" onclick="swipeCard('right')" title="Liker">
          <svg viewBox="0 0 24 24" fill="white" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- NOTE MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalName">Envoyer une note à</div>
        <div class="modal-sub" id="notesRemaining">Il te reste <strong>4</strong> notes aujourd'hui</div>
        <textarea class="note-textarea" id="noteText" placeholder="Dis quelque chose d'authentique..." maxlength="200"></textarea>
        <div class="char-count"><span id="charCount">0</span>/200</div>
        <div class="modal-actions">
          <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
          <button class="btn btn-send" id="sendBtn" onclick="sendNote()">Envoyer avec le like ❤️</button>
        </div>
      </div>
    </div>

    <!-- NOTES PANEL -->
    <div class="side-panel" id="notesPanel">
      <div class="panel-header">
        <div class="panel-title">Notes envoyées</div>
        <div class="panel-close" onclick="toggleNotesPanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <div id="notesList"></div>
    </div>

    <!-- MATCHES PANEL -->
    <div class="side-panel" id="matchesPanel">
      <div class="panel-header">
        <div class="panel-title">Mes matches ❤️</div>
        <div class="panel-close" onclick="toggleMatchesPanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <div id="matchesList"></div>
    </div>

    <!-- PROFILE PANEL -->
    <div class="side-panel" id="profilePanel">
      <div class="panel-header">
        <div class="panel-title">Mon profil</div>
        <div class="panel-close" onclick="toggleProfilePanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
      <div id="profileContent"></div>
    </div>

  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
