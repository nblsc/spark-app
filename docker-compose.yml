services:
  web:
    build: .
    image: spark-app:latest
    volumes:
      - sqlite_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/dating_app.db
      - ALLOWED_ORIGINS=http://localhost:5000,http://localhost:5001
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  sqlite_data: